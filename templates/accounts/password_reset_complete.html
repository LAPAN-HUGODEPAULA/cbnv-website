{% extends "accounts/base_auth.html" %}

{% block title %}Senha redefinida — {{ block.super }}{% endblock %}

{% block auth_content %}
<div class="text-center py-4">
    <svg class="mx-auto w-12 h-12 text-cbnv-green-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    <p class="text-sm text-cbnv-text-muted mb-6">
        Sua senha foi redefinida com sucesso.
    </p>
    <a href="{% url 'accounts:login' %}">
        {% include "components/button.html" with label="Entrar" variant="primary" tag="a" href='/conta/entrar/' %}
    </a>
</div>
{% endblock %}
