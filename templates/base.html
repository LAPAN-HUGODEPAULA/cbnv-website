{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.search_description|default:'XII Congresso Brasileiro de Neurociências da Visão — CBNV 2026' }}">
    <title>{% block title %}CBNV 2026{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
    {% block body %}
    {% block content %}{% endblock %}
    {% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
