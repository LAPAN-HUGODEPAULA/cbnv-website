<div class="{% if horizontal %}flex items-center gap-4{% endif %}">
    <label for="{{ id|default:'input' }}" class="
        block text-sm font-medium text-cbnv-text-primary
        {% if horizontal %}w-40 shrink-0{% else %}mb-1{% endif %}
        {% if required %}after:content-['*'] after:ml-0.5 after:text-red-500{% endif %}
    ">
        {{ label }}
    </label>
    {% if tag == 'textarea' %}
        <textarea
            id="{{ id|default:'input' }}"
            name="{{ name|default:id|default:'input' }}"
            rows="{{ rows|default:4 }}"
            placeholder="{{ placeholder|default:'' }}"
            {% if required %}required{% endif %}
            {% if help_text %}aria-describedby="{{ id|default:'input' }}-help"{% endif %}
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-cbnv-text-primary placeholder:text-cbnv-text-muted focus:border-cbnv-blue-600 focus:ring-2 focus:ring-cbnv-blue-600/20 focus:outline-none disabled:bg-white/5 disabled:text-cbnv-text-muted transition-colors"
            {{ attrs|default:'' }}
        >{{ value|default:'' }}</textarea>
    {% elif tag == 'select' %}
        <select
            id="{{ id|default:'input' }}"
            name="{{ name|default:id|default:'input' }}"
            {% if required %}required{% endif %}
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-cbnv-text-primary focus:border-cbnv-blue-600 focus:ring-2 focus:ring-cbnv-blue-600/20 focus:outline-none disabled:bg-white/5 disabled:text-cbnv-text-muted transition-colors"
            {{ attrs|default:'' }}>
            <option value="" class="bg-cbnv-navy-900">Selecione...</option>
            {% for opt_value, opt_label in choices %}
                <option value="{{ opt_value }}" {% if value == opt_value %}selected{% endif %} class="bg-cbnv-navy-900">{{ opt_label }}</option>
            {% endfor %}
        </select>
    {% else %}
        <input
            type="{{ type|default:'text' }}"
            id="{{ id|default:'input' }}"
            name="{{ name|default:id|default:'input' }}"
            value="{{ value|default:'' }}"
            placeholder="{{ placeholder|default:'' }}"
            {% if required %}required{% endif %}
            {% if help_text %}aria-describedby="{{ id|default:'input' }}-help"{% endif %}
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-cbnv-text-primary placeholder:text-cbnv-text-muted focus:border-cbnv-blue-600 focus:ring-2 focus:ring-cbnv-blue-600/20 focus:outline-none disabled:bg-white/5 disabled:text-cbnv-text-muted transition-colors"
            {{ attrs|default:'' }}>
    {% endif %}
    {% if help_text %}
        <p id="{{ id|default:'input' }}-help" class="mt-1 text-xs text-cbnv-text-muted {% if horizontal %}mb-0{% endif %}">{{ help_text }}</p>
    {% endif %}
    {% if error %}
        <p class="mt-1 text-xs text-red-400" role="alert">{{ error }}</p>
    {% endif %}
</div>
