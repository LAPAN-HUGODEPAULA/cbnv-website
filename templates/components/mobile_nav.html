{% comment %}
Mobile navigation overlay — controlled by Alpine.js x-data in header.
Requires parent element with x-data="{ mobileOpen: false }".
Usage: {% include "components/mobile_nav.html" with menu_items=menu_items %}
{% endcomment %}
<nav
    id="mobile-menu"
    x-show="mobileOpen"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-1"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-1"
    class="lg:hidden pb-6 pt-2 space-y-1"
    @keydown.escape.window="mobileOpen = false"
    aria-label="Menu mobile"
    role="navigation">
    {% for link in menu_items %}
        <a
            href="{{ link.url }}"
            @click="mobileOpen = false"
            class="block px-4 py-3 rounded-xl text-base font-medium text-cbnv-text-light hover:text-cbnv-white hover:bg-cbnv-navy-900/5 transition-colors focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cbnv-green-400
                {% if link.active %}bg-cbnv-navy-900/5 text-cbnv-text-light{% endif %}">
            {{ link.label }}
        </a>
    {% endfor %}
</nav>
