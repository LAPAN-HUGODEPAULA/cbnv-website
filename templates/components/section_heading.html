{% if eyebrow %}
<p class="text-xs uppercase tracking-[0.2em] font-cbnv-label font-medium text-cbnv-green-400 mb-2">
    {{ eyebrow }}
</p>
{% endif %}
{% if heading %}
<h2 class="font-cbnv-display text-3xl md:text-4xl font-semibold text-cbnv-text-primary leading-tight">
    {{ heading }}
</h2>
{% endif %}
{% if description %}
<p class="mt-3 text-base md:text-lg text-cbnv-text-secondary max-w-2xl leading-relaxed">
    {{ description }}
</p>
{% endif %}
{% if cta_label %}
<div class="mt-6">
    {% include "components/button.html" with label=cta_label href=cta_href|default:'#' variant=cta_variant|default:'primary' %}
</div>
{% endif %}
