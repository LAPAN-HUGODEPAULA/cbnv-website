<div class="flex flex-col items-center justify-center py-16 text-center">
    <div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-cbnv-text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
        </svg>
    </div>
    <p class="text-sm font-medium text-cbnv-text-primary">{{ message|default:'Nenhum item encontrado.' }}</p>
    {% if action_label %}
        <div class="mt-4">
            {% include "components/button.html" with label=action_label variant="outline" size="sm" href=action_href|default:'#' %}
        </div>
    {% endif %}
</div>
