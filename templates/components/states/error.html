<div class="flex flex-col items-center justify-center py-16 text-center" role="alert">
    <div class="w-16 h-16 rounded-full bg-red-50 flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
    </div>
    <p class="text-sm font-medium text-cbnv-text-primary">{{ message|default:'Ocorreu um erro inesperado.' }}</p>
    {% if detail %}
        <p class="text-xs text-cbnv-text-muted mt-1 max-w-md">{{ detail }}</p>
    {% endif %}
    {% if action_label %}
        <div class="mt-4">
            {% include "components/button.html" with label=action_label variant="outline" size="sm" href=action_href|default:'#' %}
        </div>
    {% endif %}
</div>
