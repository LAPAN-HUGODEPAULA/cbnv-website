<section aria-label="Autores e instituições">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
        <h2 class="text-lg font-semibold text-cbnv-navy-950">Autores e Instituições</h2>
        <div class="flex items-center gap-2">
            <a href="{% url 'reports:export_authors' %}?format=csv" class="text-xs text-gray-500 hover:text-gray-700 underline">CSV</a>
            <span class="text-gray-300">|</span>
            <a href="{% url 'reports:export_authors' %}?format=json" class="text-xs text-gray-500 hover:text-gray-700 underline">JSON</a>
        </div>
    </div>

    <div class="overflow-x-auto rounded-xl border border-gray-200">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-gray-50 border-b border-gray-200 text-gray-500">
                    <th class="px-4 py-3 text-left font-medium">#</th>
                    <th class="px-4 py-3 text-left font-medium">Instituição</th>
                    <th class="px-4 py-3 text-right font-medium">Submissões</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for inst in institutions %}
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="px-4 py-2.5 text-gray-400">{{ forloop.counter }}</td>
                    <td class="px-4 py-2.5 font-medium text-gray-700">{{ inst.authors__institution }}</td>
                    <td class="px-4 py-2.5 text-right font-medium text-cbnv-navy-950">{{ inst.count }}</td>
                </tr>
                {% empty %}
                <tr><td class="px-4 py-6 text-center text-gray-400" colspan="3">Sem dados</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
