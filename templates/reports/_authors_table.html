<section aria-label="Autores e instituições">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
        <h2 class="text-lg font-semibold text-cbnv-text-primary">Autores e Instituições</h2>
        <div class="flex items-center gap-2">
            <a href="{% url 'reports:export_institutions' %}?format=xlsx{% if filter_querystring %}&{{ filter_querystring }}{% endif %}" class="text-xs text-cbnv-text-muted hover:text-cbnv-text-secondary underline">Instituições (XLSX)</a>
            <span class="text-cbnv-text-muted">|</span>
            <a href="{% url 'reports:export_authors' %}?format=xlsx{% if filter_querystring %}&{{ filter_querystring }}{% endif %}" class="text-xs text-cbnv-text-muted hover:text-cbnv-text-secondary underline">Autores (XLSX)</a>
            <span class="text-cbnv-text-muted">|</span>
            <a href="{% url 'reports:export_authors' %}?format=csv{% if filter_querystring %}&{{ filter_querystring }}{% endif %}" class="text-xs text-cbnv-text-muted hover:text-cbnv-text-secondary underline">CSV</a>
            <span class="text-cbnv-text-muted">|</span>
            <a href="{% url 'reports:export_authors' %}?format=json{% if filter_querystring %}&{{ filter_querystring }}{% endif %}" class="text-xs text-cbnv-text-muted hover:text-cbnv-text-secondary underline">JSON</a>
        </div>
    </div>

    <div class="overflow-x-auto rounded-xl border border-white/10">
        <table class="w-full text-sm">
            <thead>
                <tr class="bg-cbnv-navy-900/5 border-b border-white/10 text-cbnv-text-muted">
                    <th class="px-4 py-3 text-left font-medium">#</th>
                    <th class="px-4 py-3 text-left font-medium">Instituição</th>
                    <th class="px-4 py-3 text-right font-medium">Submissões</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                {% for inst in institutions %}
                <tr class="hover:bg-cbnv-navy-900/5 transition-colors">
                    <td class="px-4 py-2.5 text-cbnv-text-muted">{{ forloop.counter }}</td>
                    <td class="px-4 py-2.5 font-medium text-cbnv-text-secondary">{{ inst.authors__institution }}</td>
                    <td class="px-4 py-2.5 text-right font-medium text-cbnv-text-primary">{{ inst.count }}</td>
                </tr>
                {% empty %}
                <tr><td class="px-4 py-6 text-center text-cbnv-text-muted" colspan="3">Sem dados</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
