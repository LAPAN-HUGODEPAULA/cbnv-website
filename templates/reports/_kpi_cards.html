<section aria-label="Indicadores gerais">
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
        <div class="rounded-xl border border-white/10 bg-cbnv-navy-900 p-4 sm:p-5">
            <p class="text-sm font-medium text-cbnv-text-muted">Submissões</p>
            <p class="mt-1 text-3xl font-bold text-cbnv-text-primary">{{ total|default:"0" }}</p>
        </div>
        <div class="rounded-xl border border-white/10 bg-cbnv-navy-900 p-4 sm:p-5">
            <p class="text-sm font-medium text-cbnv-text-muted">Autores</p>
            <p class="mt-1 text-3xl font-bold text-cbnv-text-primary">{{ unique_authors|default:"0" }}</p>
        </div>
        <div class="rounded-xl border border-white/10 bg-cbnv-navy-900 p-4 sm:p-5">
            <p class="text-sm font-medium text-cbnv-text-muted">Instituições</p>
            <p class="mt-1 text-3xl font-bold text-cbnv-text-primary">{{ unique_institutions|default:"0" }}</p>
        </div>
        <div class="rounded-xl border border-white/10 bg-cbnv-navy-900 p-4 sm:p-5">
            <p class="text-sm font-medium text-cbnv-text-muted">Países</p>
            <p class="mt-1 text-3xl font-bold text-cbnv-text-primary">{{ unique_countries|default:"0" }}</p>
        </div>
        <div class="rounded-xl border border-white/10 bg-cbnv-navy-900 p-4 sm:p-5">
            <p class="text-sm font-medium text-cbnv-text-muted">Revisões</p>
            <p class="mt-1 text-3xl font-bold text-cbnv-green-400">{{ completed|default:"0" }}<span class="text-base font-normal text-cbnv-text-muted">/{{ total_assigned|default:"0" }}</span></p>
        </div>
    </div>
</section>
