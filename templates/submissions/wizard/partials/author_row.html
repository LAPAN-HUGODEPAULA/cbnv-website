<div class="p-4 rounded-lg border border-white/10 relative author-row">
    <button type="button"
        class="absolute top-2 right-2 text-cbnv-text-muted hover:text-red-500 transition-colors"
        onclick="this.closest('.author-row').remove(); updateAuthorForms();"
        aria-label="Remover autor">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
            {{ form.first_name }}
        </div>
        <div>
            {{ form.last_name }}
        </div>
        <div>
            {{ form.email }}
        </div>
        <div>
            {{ form.institution }}
        </div>
    </div>
</div>
